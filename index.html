<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout AI Core Industry Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #030407;
  --navy: #07111f;
  --panel: #0b1424;
  --panel2: #101c30;
  --panel3: #15243c;
  --cyan: #27d8ff;
  --cyan2: #6ee7ff;
  --blue: #2776ff;
  --red: #ef1c25;
  --orange: #ff791f;
  --green: #22c55e;
  --yellow: #facc15;
  --text: #f4f8ff;
  --muted: #8fa6c3;
  --dim: #536985;
  --border: rgba(255,255,255,0.09);
  --glow: rgba(39,216,255,0.18);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "DM Sans", sans-serif;
  background:
    radial-gradient(circle at 50% 0%, rgba(39,216,255,0.15), transparent 34%),
    radial-gradient(circle at 10% 20%, rgba(239,28,37,0.08), transparent 22%),
    radial-gradient(circle at 90% 20%, rgba(255,121,31,0.08), transparent 22%),
    var(--black);
  color: var(--text);
}

body:before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(39,216,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(39,216,255,0.035) 1px, transparent 1px);
  background-size: 46px 46px;
  pointer-events: none;
}

.app {
  position: relative;
  z-index: 1;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(3,4,7,0.72);
  backdrop-filter: blur(18px);
  position: sticky;
  top: 0;
  z-index: 10;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-mark {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-family: "Syne", sans-serif;
  font-weight: 800;
  font-size: 18px;
  color: var(--cyan2);
  border: 1px solid rgba(39,216,255,0.35);
  background: radial-gradient(circle at 30% 30%, rgba(39,216,255,0.22), rgba(7,17,31,0.95));
  box-shadow: 0 0 24px rgba(39,216,255,0.22);
}

.brand-name {
  font-family: "Syne", sans-serif;
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 0.2px;
}

.brand-sub {
  font-size: 11px;
  color: var(--cyan2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.industry-switcher {
  display: flex;
  align-items: center;
  gap: 8px;
}

.industry-btn {
  width: 38px;
  height: 38px;
  padding: 0;
  border: 1px solid rgba(255,255,255,0.10);
  color: rgba(244,248,255,0.82);
  background: rgba(255,255,255,0.03);
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.22s ease;
}

.industry-btn:hover,
.industry-btn.active {
  border-color: rgba(39,216,255,0.26);
  background: rgba(39,216,255,0.07);
  color: var(--cyan2);
}

.industry-btn svg {
  width: 15px;
  height: 15px;
  display: block;
}

.main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 44px 24px 80px;
}

.hero {
  text-align: center;
  max-width: 920px;
  margin: 0 auto 34px;
}

.kicker {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  color: var(--cyan2);
  border: 1px solid rgba(39,216,255,0.28);
  background: rgba(39,216,255,0.08);
  padding: 7px 12px;
  border-radius: 999px;
  font-size: 11px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  font-weight: 800;
  margin-bottom: 18px;
}

.hero h1 {
  font-family: "Syne", sans-serif;
  font-size: clamp(38px, 6vw, 72px);
  line-height: 0.95;
  letter-spacing: -2.2px;
  margin: 0 0 14px;
}

.hero h1 span {
  color: var(--cyan);
  text-shadow: 0 0 30px rgba(39,216,255,0.35);
}

.hero p {
  margin: 0 auto;
  max-width: 760px;
  color: var(--muted);
  font-size: 18px;
  line-height: 1.65;
}

.engine-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  margin: 34px 0 28px;
}

.engine-tile {
  border: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.018));
  border-radius: 18px;
  padding: 20px 18px;
  min-height: 182px;
  cursor: pointer;
  transition: all 0.22s ease;
  position: relative;
  overflow: hidden;
  text-align: center;
}

.engine-tile:before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(39,216,255,0.14), transparent 55%);
  opacity: 0;
  transition: opacity 0.22s ease;
}

.engine-tile:hover,
.engine-tile.active {
  transform: translateY(-4px);
  border-color: rgba(39,216,255,0.45);
  box-shadow: 0 20px 46px rgba(0,0,0,0.28), 0 0 30px rgba(39,216,255,0.10);
}

.engine-tile:hover:before,
.engine-tile.active:before {
  opacity: 1;
}

.tile-step {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border-radius: 999px;
  background: rgba(39,216,255,0.10);
  border: 1px solid rgba(39,216,255,0.26);
  color: var(--cyan2);
  font-weight: 800;
  font-size: 12px;
  margin: 0 auto 14px;
  position: relative;
}

.engine-tile h3 {
  font-family: "Syne", sans-serif;
  font-size: 18px;
  margin: 0 0 10px;
  position: relative;
}

.engine-tile ul {
  margin: 0;
  padding-left: 18px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
  text-align: left;
  display: inline-block;
  position: relative;
}

.engine-view {
  display: none;
  grid-template-columns: minmax(0, 1.28fr) minmax(320px, 0.72fr);
  gap: 18px;
  align-items: stretch;
}

.engine-view.active {
  display: grid;
}

.demo-panel,
.coach-panel {
  border: 1px solid var(--border);
  background: rgba(11,20,36,0.9);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.32);
}

.panel-head {
  padding: 18px 20px;
  background: linear-gradient(90deg, rgba(39,216,255,0.10), rgba(255,255,255,0.02));
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.panel-title {
  font-family: "Syne", sans-serif;
  font-size: 20px;
  font-weight: 800;
}

.panel-label {
  color: var(--cyan2);
  font-size: 10px;
  letter-spacing: 1.7px;
  text-transform: uppercase;
  font-weight: 800;
}

.panel-body {
  padding: 20px;
}

.flow {
  display: grid;
  gap: 12px;
}

.flow-card {
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.035);
  border-radius: 16px;
  padding: 16px;
}

.flow-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.flow-title {
  font-weight: 800;
  font-family: "Syne", sans-serif;
}

.flow-card ul {
  margin: 0;
  padding-left: 18px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.55;
}

.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 90px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.3px;
  text-align: center;
}

.hot {
  background: rgba(239,28,37,0.13);
  color: #ff9095;
  border: 1px solid rgba(239,28,37,0.35);
}

.warm {
  background: rgba(255,121,31,0.13);
  color: #ffb27d;
  border: 1px solid rgba(255,121,31,0.34);
}

.ready {
  background: rgba(34,197,94,0.13);
  color: #86efac;
  border: 1px solid rgba(34,197,94,0.34);
}

.info {
  background: rgba(39,216,255,0.12);
  color: var(--cyan2);
  border: 1px solid rgba(39,216,255,0.34);
}

.mini-dashboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.metric {
  background: rgba(255,255,255,0.035);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
}

.metric-num {
  font-family: "Syne", sans-serif;
  font-size: 30px;
  font-weight: 800;
  color: var(--cyan);
  margin-bottom: 4px;
}

.metric-label {
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.coach-panel {
  background: rgba(7,17,31,0.94);
}

.coach-section {
  border-bottom: 1px solid var(--border);
  padding: 18px 20px;
}

.coach-section:last-child {
  border-bottom: none;
}

.coach-section h4 {
  color: var(--cyan2);
  margin: 0 0 10px;
  font-family: "Syne", sans-serif;
  font-size: 14px;
  letter-spacing: 0.2px;
}

.coach-section ul {
  margin: 0;
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.62;
  font-size: 14px;
}

.coach-quote {
  color: var(--text) !important;
}

.close-screen {
  margin-top: 18px;
  border: 1px solid rgba(39,216,255,0.28);
  background: linear-gradient(135deg, rgba(39,216,255,0.12), rgba(39,216,255,0.03));
  border-radius: 22px;
  padding: 22px;
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 20px;
  align-items: center;
}

.close-screen h2 {
  font-family: "Syne", sans-serif;
  margin: 0 0 8px;
  font-size: 26px;
}

.close-screen ul {
  margin: 0;
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.58;
}

.close-price {
  text-align: center;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.22);
  border-radius: 18px;
  padding: 18px;
}

.close-price strong {
  display: block;
  font-family: "Syne", sans-serif;
  font-size: 32px;
  color: var(--cyan);
  margin-bottom: 4px;
}

.footer-note {
  margin-top: 12px;
  color: var(--dim);
  text-align: center;
  font-size: 12px;
}

@media (max-width: 1100px) {
  .engine-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 980px) {
  .topbar {
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
  }

  .top-actions {
    width: 100%;
    justify-content: flex-end;
  }

  .engine-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .engine-view,
  .close-screen {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 560px) {
  .topbar {
    padding: 14px 16px;
  }

  .main {
    padding: 34px 16px 60px;
  }

  .engine-grid {
    grid-template-columns: 1fr;
  }

  .mini-dashboard {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

let currentIndustry = 'attorney';
let activeSection = 0;

const heroKicker = document.getElementById('heroKicker');
const heroTitle = document.getElementById('heroTitle');
const heroCopy = document.getElementById('heroCopy');
const engineGrid = document.getElementById('engineGrid');
const panelLabel = document.getElementById('panelLabel');
const panelTitle = document.getElementById('panelTitle');
const panelBadge = document.getElementById('panelBadge');
const panelBody = document.getElementById('panelBody');
const sideBody = document.getElementById('sideBody');
const closeTitle = document.getElementById('closeTitle');
const closeCopy = document.getElementById('closeCopy');
const closePrice = document.getElementById('closePrice');
const closePriceNote = document.getElementById('closePriceNote');
const switchButtons = document.querySelectorAll('.industry-btn');

function renderBulletList(items, className = '') {
  return `<ul class="${className}">${items.map(item => `<li>${item}</li>`).join('')}</ul>`;
}

function renderTiles() {
  const config = industryConfigs[currentIndustry];
  engineGrid.innerHTML = config.sections.map((section, index) => `
    <div class="engine-tile ${index === activeSection ? 'active' : ''}" data-index="${index}">
      <div class="tile-step">${index + 1}</div>
      <h3>${section.tileTitle}</h3>
      ${renderBulletList(section.tileBullets)}
    </div>
  `).join('');

  engineGrid.querySelectorAll('.engine-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      activeSection = Number(tile.dataset.index);
      renderTiles();
      renderSection();
      document.getElementById('engineView').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

function renderFlowCards(cards) {
  return `
    <div class="flow">
      ${cards.map(card => `
        <div class="flow-card">
          <div class="flow-top">
            <div class="flow-title">${card.title}</div>
            <span class="badge ${card.badgeClass}">${card.badge}</span>
          </div>
          ${renderBulletList(card.bullets)}
        </div>
      `).join('')}
    </div>
  `;
}

function renderDashboard(section) {
  return `
    <div class="mini-dashboard">
      ${section.metrics.map(metric => `
        <div class="metric">
          <div class="metric-num">${metric.value}</div>
          <div class="metric-label">${metric.label}</div>
        </div>
      `).join('')}
    </div>
    <div style="margin-top: 12px;">
      ${renderFlowCards(section.cards)}
    </div>
  `;
}

function renderSection() {
  const config = industryConfigs[currentIndustry];
  const section = config.sections[activeSection];

  panelLabel.textContent = section.panelLabel;
  panelTitle.textContent = section.panelTitle;
  panelBadge.textContent = section.panelBadge;
  panelBody.innerHTML = section.type === 'dashboard' ? renderDashboard(section) : renderFlowCards(section.cards);

  sideBody.innerHTML = section.sideSections.map(item => `
    <div class="coach-section">
      <h4>${item.title}</h4>
      ${renderBulletList(item.bullets, item.className || '')}
    </div>
  `).join('');
}

function renderIndustry() {
  const config = industryConfigs[currentIndustry];
  heroKicker.textContent = config.kicker;
  heroTitle.innerHTML = config.heroTitle;
  heroCopy.textContent = config.heroCopy;
  closeTitle.textContent = config.close.title;
  closeCopy.innerHTML = renderBulletList(config.close.bullets);
  closePrice.textContent = config.close.price;
  closePriceNote.textContent = config.close.note;

  switchButtons.forEach(button => {
    button.classList.toggle('active', button.dataset.industry === currentIndustry);
  });

  renderTiles();
  renderSection();
}

function setIndustry(industry) {
  if (!industryConfigs[industry]) return;
  currentIndustry = industry;
  activeSection = 0;
  renderIndustry();
}

switchButtons.forEach(button => {
  button.addEventListener('click', () => {
    const industry = button.dataset.industry;
    setIndustry(industry);
    window.location.hash = industry;
  });
});

window.addEventListener('hashchange', () => {
  const industryFromHash = window.location.hash.replace('#', '');
  if (industryConfigs[industryFromHash]) {
    setIndustry(industryFromHash);
  }
});

const industryFromHash = window.location.hash.replace('#', '');
if (industryConfigs[industryFromHash]) {
  currentIndustry = industryFromHash;
}
renderIndustry();
</script>
